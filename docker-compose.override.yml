services:
  # W lokalnym dev frontend uruchamiasz przez `cd frontend && npm run dev`
  # nginx container jest tylko na produkcję (Coolify)
  frontend:
    profiles:
      - production

  api:
    volumes:
      - .:/app
    command: uvicorn graphait.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
