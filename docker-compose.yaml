services:
  frontend:
    image: ghcr.io/timmlion/graphait-frontend:latest
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/timmlion/graphait-api:latest
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://graphait:${POSTGRES_PASSWORD:-graphait}@db:5432/graphait
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: graphait
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphait}
      POSTGRES_DB: graphait
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphait"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
